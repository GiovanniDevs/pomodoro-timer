<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Bootstrap link -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <!-- Custom CSS -->

    <link rel="stylesheet" href="assets/CSS/style.css" />
    <title>Tomato Timer</title>
  </head>
  <body class="d-flex align-items-center min-vh-100">
    <header class="w-100">
      <!-- 
        min-vh-100 → full viewport height
        w-100 → prevents width collapse -->
      <div class="container">
        <div class="row justify-content-center">
          <div id="timer-area" class="col-12 custom-border">
            <div id="timers-row" class="row my-3">
              <div class="col-12 d-flex justify-content-center gap-3">
                <button
                  type="button"
                  id="focus-mode"
                  class="btn btn-primary rounded-pill btn-default btn-active not-a-button"
                >
                  Focus
                </button>
                <button
                  type="button"
                  id="short-mode"
                  class="btn btn-primary rounded-pill btn-default not-a-button"
                >
                  Short Break
                </button>
                <button
                  type="button"
                  id="long-mode"
                  class="btn btn-primary rounded-pill btn-default not-a-button"
                >
                  Long Break
                </button>
              </div>
            </div>
            <div id="countdown" class="row text-center">
              <div
                id="done-sessions"
                class="col-3 pe-0 align-content-center white-text"
              >
                2
              </div>
              <div class="col-6 px-0">
                <h3 id="timer" class="display-1 white-text">25:00</h3>
              </div>
              <div
                id="done-sets"
                class="col-3 ps-0 align-content-center white-text"
              >
                1
              </div>
            </div>
            <div id="buttons-row" class="row my-3">
              <div class="col-12 d-flex justify-content-center gap-3">
                <button
                  type="button"
                  id="start"
                  class="btn btn-primary rounded-pill btn-active"
                >
                  <i class="fa-solid fa-play"></i>
                </button>
                <button
                  type="button"
                  id="pause"
                  class="btn btn-primary rounded-pill btn-active invis"
                >
                  <i class="fa-solid fa-pause"></i>
                </button>
                <button
                  id="reset"
                  type="button"
                  class="btn btn-primary rounded-pill btn-default"
                >
                  <i class="fa-solid fa-rotate-left"></i>
                </button>
                <button
                  type="button"
                  class="btn btn-primary rounded-pill btn-default"
                  data-bs-toggle="modal"
                  data-bs-target="#settingsModal"
                  aria-controls="settingsModal"
                  aria-label="Open settings"
                >
                  <i class="fa-solid fa-gear"></i>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
      <!-- Settings Modal -->
      <div
        class="modal fade"
        id="settingsModal"
        tabindex="-1"
        aria-labelledby="settingsModalLabel"
        aria-hidden="true"
      >
        <div class="modal-dialog modal-dialog-centered">
          <div class="modal-content">
            <div class="modal-header p-2">
              <h1
                class="modal-title fs-6 flex-grow-1 text-center"
                id="settingsModalLabel"
              >
                Settings
              </h1>
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="modal"
                aria-label="Close"
              ></button>
            </div>
            <div class="modal-body p-2">
              <div class="container-fluid">
                <div class="row">
                  <div class="col-3">
                    <div class="row">
                      <div class="col-12 settings-nav">
                        <button
                          type="button"
                          class="settings-nav-btn is-active"
                          data-target="look-panel"
                        >
                          Look
                        </button>
                        <button
                          type="button"
                          class="settings-nav-btn"
                          data-target="timers-panel"
                        >
                          Timers
                        </button>
                        <button
                          type="button"
                          class="settings-nav-btn"
                          data-target="sounds-panel"
                        >
                          Sounds
                        </button>
                      </div>
                    </div>
                  </div>
                  <!-- Look tab -->
                  <div
                    id="look-panel"
                    class="col-9 ms-auto settings-area settings-panel is-active"
                  >
                    <div class="color-setting mt-2">
                      <span class="settings-label">Timer Color</span>

                      <!-- Label wraps the circle but target the input -->
                      <label class="color-picker" for="favcolor">
                        <span id="color-button" class="color-button"></span>
                      </label>

                      <input type="color" id="favcolor" value="#363636" />
                    </div>
                    <div class="canvas-setting mt-2">
                      <span class="settings-label">Canvas Color</span>

                      <!-- Label wraps the circle but target the input -->
                      <label class="color-picker" for="favcolor-canvas">
                        <span id="canvas-button" class="color-button"></span>
                      </label>

                      <input
                        type="color"
                        id="favcolor-canvas"
                        value="#191919"
                      />
                    </div>
                    <div class="setting-label mt-2">
                      <span class="settings-label">Font</span>
                      <select
                        id="font-select"
                        class="settings-label select-input mb-2"
                      >
                        <option value="work">Work Sans</option>
                        <option value="poiret">Poiret One</option>
                        <option value="bitcount">Bitcount</option>
                        <option value="noto">Noto</option>
                        <option value="zain">Zain</option>
                      </select>
                    </div>
                    <div class="setting-label mt-2">
                      <span class="settings-label">Border Style</span>
                      <select
                        id="border-select"
                        class="settings-label select-input mb-2"
                      >
                        <option value="solid">Solid</option>

                        <option value="double">Double</option>
                        <option value="groove">Groove</option>
                        <option value="ridge">Ridge</option>
                        <option value="inset">Inset</option>
                        <option value="outset">Outset</option>
                        <option value="none">None</option>
                      </select>
                    </div>
                  </div>
                  <!-- Timers Tab -->
                  <div
                    id="timers-panel"
                    class="col-9 ms-auto settings-area settings-panel"
                  >
                    <div class="timer-setting mt-2">
                      <p class="settings-label">
                        The typical sequence is: Focus -> Short break, repeat 4
                        times, one long break.
                      </p>
                      <!-- TIMER grid system -->
                      <div class="timer-grid">
                        <label for="work-timer" class="settings-label"
                          >Focus</label
                        >
                        <label for="short-timer" class="settings-label"
                          >Short break</label
                        >
                        <label for="long-timer" class="settings-label"
                          >Long break</label
                        >
                        <div>
                          <input
                            class="timer-input"
                            type="text"
                            id="work-timer"
                            value="25"
                          />
                          <p class="minutes-label">minutes</p>
                        </div>
                        <div>
                          <input
                            class="timer-input"
                            type="text"
                            id="short-timer"
                            value="5"
                          />
                          <p class="minutes-label">minutes</p>
                        </div>
                        <div>
                          <input
                            class="timer-input"
                            type="text"
                            id="long-timer"
                            value="30"
                          />
                          <p class="minutes-label">minutes</p>
                        </div>
                      </div>
                      <!-- Set number of repetitions before long break -->
                      <label for="reps" class="settings-label"
                        >Select the number of repetition before a Long
                        Break</label
                      >
                      <input
                        class="timer-input mb-2"
                        type="text"
                        id="reps"
                        value="4"
                      />
                    </div>
                  </div>
                  <!-- Sounds Tab -->
                  <div
                    id="sounds-panel"
                    class="col-9 ms-auto settings-area settings-panel"
                  >
                    <div class="sound-setting p-2">
                      <p class="settings-label mb-2">
                        Choose an alert, enable it for timer completion, and set
                        your preferred volume.
                      </p>
                      <div class="sound-toggle mb-2">
                        <input
                          type="checkbox"
                          id="enable-alert"
                          class="form-check-input"
                          checked
                        />
                        <label for="enable-alert" class="settings-label mb-0"
                          >Enable alert when timer ends</label
                        >
                      </div>
                      <div class="row">
                        <div class="col-6 stack">
                          <label
                            for="alert-sound"
                            class="settings-label d-block"
                            >Lap-alert sound</label
                          >

                          <select
                            id="alert-sound"
                            class="settings-label select-input mb-2"
                          >
                            <option value="bell">Classic Bell</option>
                            <option value="beep">Digital Beep</option>
                            <option value="gong">Soft Gong</option>
                            <option value="chime">Calm Chime</option>
                            <option value="smooth">Blonk</option>
                          </select>

                          <label
                            for="alert-volume"
                            class="settings-label d-block"
                            >Alert volume:
                            <span id="volume-value" class="sound-value"
                              >70%</span
                            >
                          </label>
                          <input
                            type="range"
                            id="alert-volume"
                            class="form-range sound-slider"
                            min="0"
                            max="100"
                            value="70"
                            step="1"
                          />
                        </div>
                        <div class="col-6 stack">
                          <label
                            for="alert-sound2"
                            class="settings-label d-block"
                            >Session-alert sound</label
                          >
                          <select
                            id="alert-sound2"
                            class="settings-label select-input mb-2"
                          >
                            <option value="bell">Classic Bell</option>
                            <option value="digital">Digital Beep</option>
                            <option value="gong">Soft Gong</option>
                            <option value="chime">Calm Chime</option>
                            <option value="smooth">Blonk</option>
                          </select>

                          <label
                            for="alert-volume2"
                            class="settings-label d-block"
                            >Alert volume:
                            <span id="volume-value2" class="sound-value"
                              >70%</span
                            >
                          </label>
                          <input
                            type="range"
                            id="alert-volume2"
                            class="form-range sound-slider"
                            min="0"
                            max="100"
                            value="70"
                            step="1"
                          />
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </header>
    <!-- JS link -->
    <script src="assets/js/script.js"></script>
    <!-- BootStrap JS -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <!-- Fontawesome -->
    <script
      src="https://kit.fontawesome.com/f047558dec.js"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
